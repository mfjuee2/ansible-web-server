---
- name: Download and install Zabbix repository
  apt:
    deb: "https://repo.zabbix.com/zabbix/6.4/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.4-1+ubuntu24.04_all.deb"
    state: present

- name: Update apt cache and install Zabbix Agent
  apt:
    name: zabbix-agent
    state: present
    update_cache: yes

- name: Configure Zabbix Agent (Point to Server)
  lineinfile:
    path: /etc/zabbix/zabbix_agentd.conf
    regexp: '^Server='
    line: 'Server={{ zabbix_server_ip }}'
  notify: restart zabbix-agent