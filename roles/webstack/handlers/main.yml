---
- name: reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: restart nginx
  ansible.builtin.service:
    name: nginx
    state: restarted

- name: restart redis
  ansible.builtin.service:
    name: redis-server
    state: restarted

- name: restart zabbix-agent
  ansible.builtin.service:
    name: zabbix-agent
    state: restarted